<script>
(function bootApp() {
  'use strict';

  function showError(msg) {
    document.body.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;' +
      'min-height:100vh;font-family:sans-serif;background:#F5F6F8;">' +
      '<div style="text-align:center;padding:40px;max-width:480px;">' +
      '<div style="font-size:56px;margin-bottom:20px;">⚠️</div>' +
      '<div style="font-size:20px;font-weight:700;color:#E0483E;margin-bottom:8px;">' +
      'ไม่สามารถโหลดข้อมูลได้</div>' +
      '<div style="color:#6B7280;margin-bottom:12px;">กรุณาวางไฟล์ทั้ง 5 ไฟล์ไว้ในโฟลเดอร์เดียวกัน<br>' +
      'แล้วเปิดผ่าน Web Server (ไม่ใช่เปิดไฟล์โดยตรง)</div>' +
      '<div style="font-size:12px;color:#9AA1AC;background:#fff;padding:8px 12px;' +
      'border-radius:8px;border:1px solid #E4E7EC;">' + msg + '</div>' +
      '</div></div>';
  }

  fetch('data.json')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + r.url);
      return r.json();
    })
    .then(function(data) {
      // ── ผูก globals ที่ app.js ต้องการ ──────────────────────
      window.ITEMS_DATA          = data.ITEMS_DATA;
      window.STORES_DATA         = data.STORES_DATA;
      window.ADMIN_ACCOUNT       = data.ADMIN_ACCOUNT;
      window.MAKRO_LOGO_DATA_URI = data.MAKRO_LOGO_DATA_URI;

      // ── โหลด app.js หลัง data พร้อม ──────────────────────────
      var script    = document.createElement('script');
      script.src    = 'app.js';
      script.onerror = function() { showError('โหลด app.js ไม่ได้'); };
      document.body.appendChild(script);
    })
    .catch(function(err) {
      console.error('[boot] data.json load failed:', err);
      showError(err.message);
    });
})();
</script>
